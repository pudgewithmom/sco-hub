<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Проекты — SCO Youth Talent Hub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">SCO Youth Talent Hub</a>
      <nav class="nav" id="nav">
        <a href="index.html" class="nav__link">Главная</a>
        <a href="projects.html" class="nav__link nav__link--active">Проекты</a>
        <a href="talents.html" class="nav__link">Специалисты</a>
        <a href="about.html" class="nav__link">О платформе</a>
        <a href="pilot.html" class="nav__link">Пилотный запуск</a>
      </nav>
      <div class="header__actions">
        <a href="pilot.html" class="btn btn--primary">Разместить проект</a>
      </div>
      <button class="burger" id="burger" aria-label="Меню">&#9776;</button>
    </div>
  </header>

  <div class="page-header">
    <div class="container">
      <h1 class="page-header__title">Проектные инициативы</h1>
      <p class="page-header__sub">Найди проект, в котором можешь применить свои компетенции</p>
    </div>
  </div>

  <div class="container catalog-layout">
    <!-- Filters -->
    <aside class="filters" id="filters">
      <h3 class="filters__title">Фильтры</h3>

      <div class="filter-group">
        <label class="filter-label">Сфера проекта</label>
        <select class="filter-select" id="filter-category">
          <option value="">Все сферы</option>
          <option value="международное право">Международное право</option>
          <option value="цифровизация">Цифровизация</option>
          <option value="образование">Образование</option>
          <option value="медиа">Медиа</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Стадия</label>
        <select class="filter-select" id="filter-stage">
          <option value="">Все стадии</option>
          <option value="поиск команды">Поиск команды</option>
          <option value="идея">Идея</option>
          <option value="подготовка заявки">Подготовка заявки</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Формат</label>
        <select class="filter-select" id="filter-format">
          <option value="">Любой формат</option>
          <option value="онлайн">Онлайн</option>
          <option value="офлайн">Офлайн</option>
          <option value="смешанный">Смешанный</option>
        </select>
      </div>

      <button class="btn btn--outline btn--full" id="reset-filters">Сбросить фильтры</button>
    </aside>

    <!-- Cards -->
    <main class="catalog-main">
      <div class="catalog-meta" id="catalog-meta">Загрузка...</div>
      <div class="cards cards--list" id="projects-list"><!-- JS --></div>
    </main>
  </div>

  <footer class="footer">
    <div class="container footer__inner">
      <span class="logo">SCO Youth Talent Hub</span>
      <p class="footer__note">Демонстрационный прототип. Данные являются тестовыми.</p>
    </div>
  </footer>

  <script src="data/projects.js"></script>
  <script src="js/components.js"></script>
  <script src="js/projects.js"></script>
</body>
</html>
