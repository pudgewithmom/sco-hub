<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — SCO Youth Talent Hub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <img src="public/SCO_logo.svg" alt="SCO Logo" class="logo__img" />
        <span class="logo__text">SCO Youth Talent Hub</span>
      </a>
      <nav class="nav" id="nav">
        <a href="index.html" class="nav__link">Home</a>
        <a href="projects.html" class="nav__link nav__link--active">Projects</a>
        <a href="talents.html" class="nav__link">Specialists</a>
        <a href="about.html" class="nav__link">About</a>
        <a href="pilot.html" class="nav__link">Pilot Launch</a>
      </nav>
      <div class="header__actions">
        <a href="pilot.html" class="btn btn--primary">Post a Project</a>
      </div>
      <button class="burger" id="burger" aria-label="Menu">&#9776;</button>
    </div>
  </header>

  <div class="page-header">
    <div class="container">
      <h1 class="page-header__title">Project Initiatives</h1>
      <p class="page-header__sub">Find a project where you can apply your expertise</p>
    </div>
  </div>

  <div class="container catalog-layout">
    <aside class="filters" id="filters">
      <h3 class="filters__title">Filters</h3>

      <div class="filter-group">
        <label class="filter-label">Field</label>
        <select class="filter-select" id="filter-category">
          <option value="">All fields</option>
          <option value="digitalisation">Digitalisation</option>
          <option value="international law">International Law</option>
          <option value="education">Education</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Stage</label>
        <select class="filter-select" id="filter-stage">
          <option value="">All stages</option>
          <option value="team search">Team Search</option>
          <option value="idea">Idea</option>
          <option value="application preparation">Application Preparation</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Format</label>
        <select class="filter-select" id="filter-format">
          <option value="">Any format</option>
          <option value="online">Online</option>
          <option value="offline">Offline</option>
          <option value="hybrid">Hybrid</option>
        </select>
      </div>

      <button class="btn btn--outline btn--full" id="reset-filters">Reset Filters</button>
    </aside>

    <main class="catalog-main">
      <div class="catalog-meta" id="catalog-meta">Loading...</div>
      <div class="cards cards--list" id="projects-list"><!-- JS --></div>
    </main>
  </div>

  <footer class="footer">
    <div class="container footer__inner">
      <a href="index.html" class="logo logo--footer">
        <img src="public/SCO_logo.svg" alt="SCO Logo" class="logo__img logo__img--sm" />
        <span class="logo__text">SCO Youth Talent Hub</span>
      </a>
      <p class="footer__note">Demonstration prototype. All data is fictional.</p>
    </div>
  </footer>

  <script src="data/projects.js"></script>
  <script src="js/components.js"></script>
  <script src="js/projects.js"></script>
</body>
</html>
