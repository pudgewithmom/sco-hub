<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Специалисты — SCO Youth Talent Hub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">SCO Youth Talent Hub</a>
      <nav class="nav" id="nav">
        <a href="index.html" class="nav__link">Главная</a>
        <a href="projects.html" class="nav__link">Проекты</a>
        <a href="talents.html" class="nav__link nav__link--active">Специалисты</a>
        <a href="about.html" class="nav__link">О платформе</a>
        <a href="pilot.html" class="nav__link">Пилотный запуск</a>
      </nav>
      <div class="header__actions">
        <a href="pilot.html" class="btn btn--primary">Создать профиль</a>
      </div>
      <button class="burger" id="burger" aria-label="Меню">&#9776;</button>
    </div>
  </header>

  <div class="page-header">
    <div class="container">
      <h1 class="page-header__title">Каталог специалистов</h1>
      <p class="page-header__sub">Молодые профессионалы, готовые участвовать в международных проектах</p>
    </div>
  </div>

  <div class="container catalog-layout">
    <!-- Filters -->
    <aside class="filters" id="filters">
      <h3 class="filters__title">Фильтры</h3>

      <div class="filter-group">
        <label class="filter-label">Страна</label>
        <select class="filter-select" id="filter-country">
          <option value="">Все страны</option>
          <option value="Казахстан">Казахстан</option>
          <option value="Россия">Россия</option>
          <option value="Китай">Китай</option>
          <option value="Узбекистан">Узбекистан</option>
          <option value="Кыргызстан">Кыргызстан</option>
          <option value="Беларусь">Беларусь</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Компетенция</label>
        <select class="filter-select" id="filter-skill">
          <option value="">Все компетенции</option>
          <option value="международное право">Международное право</option>
          <option value="аналитика">Аналитика</option>
          <option value="перевод">Перевод</option>
          <option value="IT">IT-разработка</option>
          <option value="дизайн">Дизайн</option>
          <option value="PR">PR / Медиа</option>
          <option value="управление проектами">Управление проектами</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Язык</label>
        <select class="filter-select" id="filter-lang">
          <option value="">Любой язык</option>
          <option value="английский">Английский</option>
          <option value="китайский">Китайский</option>
          <option value="русский">Русский</option>
        </select>
      </div>

      <button class="btn btn--outline btn--full" id="reset-filters">Сбросить фильтры</button>
    </aside>

    <!-- Cards -->
    <main class="catalog-main">
      <div class="catalog-meta" id="catalog-meta">Загрузка...</div>
      <div class="cards cards--list" id="talents-list"><!-- JS --></div>
    </main>
  </div>

  <footer class="footer">
    <div class="container footer__inner">
      <span class="logo">SCO Youth Talent Hub</span>
      <p class="footer__note">Демонстрационный прототип. Данные являются тестовыми.</p>
    </div>
  </footer>

  <script src="data/talents.js"></script>
  <script src="js/components.js"></script>
  <script src="js/talents.js"></script>
</body>
</html>
