<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Specialists — SCO Youth Talent Hub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <img src="public/SCO_logo.svg" alt="SCO Logo" class="logo__img" />
        <span class="logo__text">SCO Youth Talent Hub</span>
      </a>
      <nav class="nav" id="nav">
        <a href="index.html" class="nav__link">Home</a>
        <a href="projects.html" class="nav__link">Projects</a>
        <a href="talents.html" class="nav__link nav__link--active">Specialists</a>
        <a href="about.html" class="nav__link">About</a>
        <a href="pilot.html" class="nav__link">Pilot Launch</a>
      </nav>
      <div class="header__actions">
        <a href="pilot.html" class="btn btn--primary">Create Profile</a>
      </div>
      <button class="burger" id="burger" aria-label="Menu">&#9776;</button>
    </div>
  </header>

  <div class="page-header">
    <div class="container">
      <h1 class="page-header__title">Specialists Catalogue</h1>
      <p class="page-header__sub">Young professionals ready to join international projects</p>
    </div>
  </div>

  <div class="container catalog-layout">
    <aside class="filters" id="filters">
      <h3 class="filters__title">Filters</h3>

      <div class="filter-group">
        <label class="filter-label">Country</label>
        <select class="filter-select" id="filter-country">
          <option value="">All countries</option>
          <option value="Kazakhstan">Kazakhstan</option>
          <option value="Russia">Russia</option>
          <option value="China">China</option>
          <option value="Uzbekistan">Uzbekistan</option>
          <option value="Kyrgyzstan">Kyrgyzstan</option>
          <option value="Belarus">Belarus</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Skill</label>
        <select class="filter-select" id="filter-skill">
          <option value="">All skills</option>
          <option value="international law">International Law</option>
          <option value="analytics">Analytics</option>
          <option value="translation">Translation</option>
          <option value="IT">IT Development</option>
          <option value="design">Design</option>
          <option value="PR">PR / Media</option>
          <option value="project management">Project Management</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">Language</label>
        <select class="filter-select" id="filter-lang">
          <option value="">Any language</option>
          <option value="english">English</option>
          <option value="chinese">Chinese</option>
          <option value="russian">Russian</option>
        </select>
      </div>

      <button class="btn btn--outline btn--full" id="reset-filters">Reset Filters</button>
    </aside>

    <main class="catalog-main">
      <div class="catalog-meta" id="catalog-meta">Loading...</div>
      <div class="cards cards--list" id="talents-list"><!-- JS --></div>
    </main>
  </div>

  <footer class="footer">
    <div class="container footer__inner">
      <a href="index.html" class="logo logo--footer">
        <img src="public/SCO_logo.svg" alt="SCO Logo" class="logo__img logo__img--sm" />
        <span class="logo__text">SCO Youth Talent Hub</span>
      </a>
      <p class="footer__note">Demonstration prototype. All data is fictional.</p>
    </div>
  </footer>

  <script src="data/talents.js"></script>
  <script src="js/components.js"></script>
  <script src="js/talents.js"></script>
</body>
</html>
