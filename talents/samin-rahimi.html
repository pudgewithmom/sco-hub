<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samin Rahimi — SCO Youth Talent Hub</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="../index.html" class="logo">
        <img src="../public/SCO_logo.svg" alt="SCO Logo" class="logo__img" />
        <span class="logo__text">SCO Youth Talent Hub</span>
      </a>
      <nav class="nav" id="nav">
        <a href="../index.html" class="nav__link">Home</a>
        <a href="../projects.html" class="nav__link">Projects</a>
        <a href="../talents.html" class="nav__link nav__link--active">Specialists</a>
        <a href="../about.html" class="nav__link">About</a>
        <a href="../pilot.html" class="nav__link">Pilot Launch</a>
      </nav>
      <button class="burger" id="burger" aria-label="Menu">&#9776;</button>
    </div>
  </header>

  <div class="container talent-page" id="talent-detail"></div>

  <div class="modal" id="invite-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal__overlay" id="modal-overlay"></div>
    <div class="modal__box">
      <button class="modal__close" id="modal-close" aria-label="Close">&#x2715;</button>
      <h2 class="modal__title" id="modal-title">Invite to a Project</h2>
      <p class="modal__note">This is a demonstration scenario. In the full version the specialist will receive a notification in their dashboard.</p>
      <form id="invite-form" class="form" novalidate>
        <div class="form-group">
          <label class="form-label" for="inv-name">Your Name *</label>
          <input class="form-input" type="text" id="inv-name" required placeholder="Your name" />
        </div>
        <div class="form-group">
          <label class="form-label" for="inv-project">Project *</label>
          <select class="form-input" id="inv-project" required>
            <option value="">Select a project</option>
            <option value="SCO Legal Youth Lab">SCO Legal Youth Lab</option>
            <option value="Digital Career Map for SCO Youth">Digital Career Map for SCO Youth</option>
            <option value="SCO Student Grant Navigator">SCO Student Grant Navigator</option>
            <option value="Youth Dialogue Media Platform">Youth Dialogue Media Platform</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="inv-role">Proposed Role</label>
          <input class="form-input" type="text" id="inv-role" placeholder="e.g. Legal Advisor" />
        </div>
        <div class="form-group">
          <label class="form-label" for="inv-msg">Message *</label>
          <textarea class="form-input form-textarea" id="inv-msg" rows="3" required placeholder="Tell the specialist about your project and why you want them on the team"></textarea>
        </div>
        <button type="submit" class="btn btn--primary btn--full">Send Invitation</button>
      </form>
    </div>
  </div>

  <footer class="footer">
    <div class="container footer__inner">
      <a href="../index.html" class="logo logo--footer">
        <img src="../public/SCO_logo.svg" alt="SCO Logo" class="logo__img logo__img--sm" />
        <span class="logo__text">SCO Youth Talent Hub</span>
      </a>
      <p class="footer__note">Demonstration prototype. All data is fictional.</p>
    </div>
  </footer>

  <script src="../data/talents.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/talent-detail.js"></script>
  <script>renderTalentDetail('samin-rahimi', '../');</script>
</body>
</html>
